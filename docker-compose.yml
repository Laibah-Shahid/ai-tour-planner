version: "3.9"

services:
  # ======================
  # Frontend (Next.js)
  # ======================
  frontend:
    build: ./frontend
    container_name: ai-tour-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # ======================
  # Backend (FastAPI)
  # ======================
  backend:
    build: ./backend
    container_name: ai-tour-backend
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - THENEWS_API_KEY=${THENEWS_API_KEY}
      - WORLD_NEWS_API_KEY=${WORLD_NEWS_API_KEY}
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY}
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
    volumes:
      - ./backend:/app

  # ======================
  # n8n (Automation Workflows)
  # ======================
  n8n:
    image: n8nio/n8n
    container_name: ai-tour-n8n
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=Asia/Karachi
    volumes:
      - ./n8n:/home/node/.n8n
